<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — L'Orangerie</title>
  <script type="module" src="/src/js/main.js"></script>
</head>
<body>

  <!-- Scroll line -->
  <div class="scroll-line" aria-hidden="true">
    <div class="scroll-line__progress"></div>
  </div>

  <!-- Nav -->
  <nav class="site-nav">
    <div class="u-container site-nav__inner">
      <a href="/" class="site-nav__logo">L'Orangerie</a>
      <button class="site-nav__toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="site-nav__links">
        <a href="/" class="site-nav__link">Accueil</a>
        <a href="/contact.html" class="site-nav__link is-active">Contact</a>
        <a href="/design-system.html" class="site-nav__link">Design System</a>
      </div>
    </div>
  </nav>

  <!-- Contact -->
  <main>
    <section class="contact u-container">
      <div class="contact__intro u-flow" data-fade-in>
        <h1 class="h2">Contact</h1>
        <p class="text-body">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut enim ad minim veniam, quis nostrud exercitation.</p>
      </div>

      <form class="form" data-fade-in>
        <div class="form__group">
          <label for="name" class="form__label">Nom</label>
          <input type="text" id="name" name="name" class="form__input" placeholder="Votre nom" required />
        </div>
        <div class="form__group">
          <label for="email" class="form__label">Email</label>
          <input type="email" id="email" name="email" class="form__input" placeholder="votre@email.com" required />
        </div>
        <div class="form__group">
          <label for="subject" class="form__label">Objet</label>
          <input type="text" id="subject" name="subject" class="form__input" placeholder="Objet de votre message" />
        </div>
        <div class="form__group">
          <label for="message" class="form__label">Message</label>
          <textarea id="message" name="message" class="form__textarea" placeholder="Votre message..." required></textarea>
        </div>
        <button type="submit" class="btn btn--filled">Envoyer</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="u-container site-footer__inner">
      <span>&copy; 2026 L'Orangerie</span>
    </div>
  </footer>

</body>
</html>
